<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Présence — Journal de soi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo">Présence</div>
    <div class="logo-sub">Journal de soi</div>

    <nav class="nav-section">
      <div class="nav-label">Navigation</div>
      <button class="nav-item active" data-view="ping">+ Nouveau ping</button>
      <button class="nav-item" data-view="journal">Journal</button>
      <button class="nav-item" data-view="analyse">Analyse</button>
      <button class="nav-item" data-view="tags">Tags</button>
    </nav>

    <div class="sidebar-footer" id="sidebar-stats"></div>
  </aside>

  <!-- ── Main ── -->
  <main class="main">

    <!-- NEW PING -->
    <section id="view-ping" class="view active">
      <div class="page-header">
        <h1 class="page-title">Nouveau ping</h1>
        <div class="page-date" id="current-datetime"></div>
      </div>

      <div class="ping-form">

        <div class="form-row">
          <label class="form-label">Ce qui t'occupe</label>
          <textarea id="noteInput" rows="3" placeholder="Ce qui te traverse en ce moment..."></textarea>
        </div>

        <div class="form-row">
          <label class="form-label">Tag de pensée</label>
          <div class="tag-grid" id="tag-selector"></div>
        </div>

        <div class="form-row">
          <label class="form-label">Mood</label>
          <div class="mood-block">
            <div class="mood-row">
              <span class="mood-row-label">Valence</span>
              <div class="valence-btns" id="valence-btns">
                <button class="valence-btn pos" data-v="pos" title="Positif">+</button>
                <button class="valence-btn neu" data-v="neu" title="Neutre">·</button>
                <button class="valence-btn neg" data-v="neg" title="Négatif">−</button>
              </div>
            </div>
            <div class="mood-row">
              <span class="mood-row-label">Intensité</span>
              <div class="intensity-row" id="intensity-btns">
                <button class="intensity-btn" data-i="1">1</button>
                <button class="intensity-btn" data-i="2">2</button>
                <button class="intensity-btn" data-i="3">3</button>
                <button class="intensity-btn" data-i="4">4</button>
                <button class="intensity-btn" data-i="5">5</button>
                <span class="intensity-label" id="intensity-label">— pas encore sélectionné</span>
              </div>
            </div>
          </div>
        </div>

        <div class="form-row two-col">
          <div>
            <label class="form-label">Lieu <span class="optional">optionnel</span></label>
            <input type="text" id="lieuInput" placeholder="Maison, bureau, café..." />
          </div>
          <div>
            <label class="form-label">Avec / À propos de <span class="optional">optionnel</span></label>
            <input type="text" id="personneInput" placeholder="Seul, avec Alex..." />
          </div>
        </div>

        <div class="form-actions">
          <button class="submit-btn" id="submitPing">Enregistrer →</button>
        </div>

      </div>
    </section>

    <!-- JOURNAL -->
    <section id="view-journal" class="view">
      <div class="page-header">
        <h1 class="page-title">Journal</h1>
        <div class="page-date" id="journal-count"></div>
      </div>
      <div id="journal-feed"></div>
    </section>

    <!-- ANALYSE -->
    <section id="view-analyse" class="view">
      <div class="page-header">
        <h1 class="page-title">Analyse</h1>
        <div class="page-date">Basé sur tous tes pings</div>
      </div>
      <div id="analyse-content"></div>
    </section>

    <!-- TAGS -->
    <section id="view-tags" class="view">
      <div class="page-header">
        <h1 class="page-title">Tags</h1>
        <div class="page-date">Gère tes catégories de pensée</div>
      </div>
      <div class="tags-list" id="tags-list"></div>
      <div class="new-tag-form">
        <input type="text" id="newTagInput" placeholder="Nouveau tag..." />
        <button id="createTagBtn">+ Créer</button>
      </div>
    </section>

  </main>
</div>

<div class="toast" id="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
