<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Présence — interruptions aléatoires pour observer tes pensées">
  <title>Présence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="title">pré<span>sence</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <button class="theme-switch" id="themeSwitch" onclick="toggleTheme()" title="Changer le thème">
      <span id="themeIcon">☀</span>
    </button>
    <div class="status-dot" id="statusDot"></div>
  </div>
</header>

<main>
  <!-- HOME -->
  <div class="view active" id="view-home">
    <div class="clock-section">
      <div class="clock" id="clock">00:00</div>
      <div class="date" id="dateDisplay">—</div>
    </div>

    <div class="divider"></div>

    <div class="config-card">
      <div class="config-label">Intervalle de rappel</div>
      <div class="interval-row">
        <div class="interval-label">Toutes les</div>
        <div class="interval-controls">
          <button class="btn-icon" onclick="changeInterval(-5)">−</button>
          <div class="interval-value" id="intervalDisplay">20</div>
          <button class="btn-icon" onclick="changeInterval(+5)">+</button>
        </div>
        <div style="color:var(--text-muted);font-size:14px;">min</div>
      </div>
      <div class="variance-row">
        <div class="toggle" id="varianceToggle" onclick="toggleVariance()"></div>
        <div>Aléatoire (±50%)</div>
      </div>
    </div>

    <div id="notifBannerContainer"></div>

    <button class="btn-main btn-start" id="mainBtn" onclick="toggleSession()">
      Commencer la session
    </button>

    <div class="next-ping" id="nextPingInfo" style="display:none">
      Prochain rappel dans <span id="nextPingCountdown">—</span>
    </div>

    <button class="btn-test" onclick="triggerPing()">⚡ Tester le ping</button>
  </div>

  <!-- CAPTURE -->
  <div class="view" id="view-capture">
    <div class="capture-header">
      <div class="capture-prompt">Où était ton esprit ?</div>
      <div class="capture-time" id="captureTime">—</div>
    </div>

    <div class="quick-tags">
      <div class="tags-label">Ce qui occupait mes pensées</div>
      <div class="tags-grid" id="tagsGrid">
        <!-- generated by JS -->
      </div>
    </div>

    <div class="free-text-section">
      <textarea id="freeText" placeholder="Précise, si tu veux…" rows="3"></textarea>
    </div>

    <div class="capture-actions">
      <button class="btn-skip" onclick="skipEntry()">Passer</button>
      <button class="btn-save" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>

  <!-- JOURNAL -->
  <div class="view" id="view-journal">
    <div class="filter-tabs">
      <button class="filter-tab active" id="tab-day" onclick="setFilter('day')">Jour</button>
      <button class="filter-tab" id="tab-week" onclick="setFilter('week')">Semaine</button>
      <button class="filter-tab" id="tab-month" onclick="setFilter('month')">Mois</button>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Pings</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statAnswered">0</div>
        <div class="stat-label">Réponses</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statRate">—</div>
        <div class="stat-label">Taux</div>
      </div>
    </div>

    <div class="journal-header">
      <div class="journal-title" id="journalTitle">Aujourd'hui</div>
      <div class="journal-count" id="journalCount">0 entrées</div>
    </div>

    <div class="entries-list" id="entriesList"></div>

    <button class="btn-export" onclick="exportData()">↓ Exporter les données</button>
  </div>
</main>

<nav id="mainNav">
  <button class="nav-btn active" onclick="showView('home')" id="nav-home">
    <div class="nav-icon">◉</div>
    <div>Session</div>
  </button>
  <button class="nav-btn" onclick="showView('journal')" id="nav-journal">
    <div class="nav-icon">≡</div>
    <div>Journal</div>
  </button>
</nav>

<!-- EDIT MODAL -->
<div id="edit-modal">
  <div class="edit-sheet">
    <h3>Modifier l'entrée</h3>
    <div class="edit-tags-grid" id="editTagsGrid"></div>
    <textarea id="editText" rows="3" placeholder="Note libre…"></textarea>
    <div class="edit-actions">
      <button class="btn-skip" style="flex:1" onclick="closeEdit()">Annuler</button>
      <button class="btn-save" style="flex:2" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- FLASH OVERLAY -->
<div id="flash-overlay"></div>

<!-- PING OVERLAY -->
<div id="ping-overlay">
  <div class="ping-card">
    <div class="ping-symbol">🔔</div>
    <div class="ping-message">Moment de présence</div>
    <div class="ping-sub">Qu'est-ce qui occupait ton esprit<br>à cet instant précis ?</div>
    <button class="btn-respond" onclick="respondToPing()">Noter mes pensées</button>
    <button class="btn-dismiss" onclick="dismissPing()">Ignorer ce ping</button>
  </div>
</div>

  <script src="js/app.js"></script>
</body>
</html>
